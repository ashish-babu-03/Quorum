syntax = "proto3";

package raft;

option java_package = "com.ashish.raftlock.grpc";
option java_multiple_files = true;
option java_outer_classname = "RaftProto";

// Internal node-to-node protocol. Clients never call this directly —
// they call the (future) LockService, which is served only by the leader.
service RaftService {
  // Sent by a candidate to every peer when it starts an election.
  rpc RequestVote (VoteRequest) returns (VoteResponse);

  // Sent by the leader to every follower. Doubles as a heartbeat when
  // entries is empty, and as log replication once entries are populated
  // (log replication logic lands in Milestone 2).
  rpc AppendEntries (AppendEntriesRequest) returns (AppendEntriesResponse);
}

message VoteRequest {
  int64 term = 1;
  string candidate_id = 2;
  int64 last_log_index = 3;
  int64 last_log_term = 4;
}

message VoteResponse {
  int64 term = 1;
  bool vote_granted = 2;
}

message AppendEntriesRequest {
  int64 term = 1;
  string leader_id = 2;
  int64 prev_log_index = 3;
  int64 prev_log_term = 4;
  repeated LogEntryProto entries = 5;
  int64 leader_commit = 6;
}

message AppendEntriesResponse {
  int64 term = 1;
  bool success = 2;
}

message LogEntryProto {
  int64 term = 1;
  int64 index = 2;
  string command = 3;
}
